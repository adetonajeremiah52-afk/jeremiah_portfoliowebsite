<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <!-- Display Screen -->
        <div class="screen">
            <div class="top-row">
                <span id="memory-indicator"></span>
                <button class="history-toggle-btn" onclick="toggleHistoryLog()">📜 History</button>
            </div>
            <div id="history"></div>
            <div id="display">0</div>
        </div>

        <!-- Buttons Grid -->
        <div class="buttons">
            <!-- Memory Keys Row -->
            <button class="btn mem" onclick="pressMem('MC')">MC</button>
            <button class="btn mem" onclick="pressMem('MR')">MR</button>
            <button class="btn mem" onclick="pressMem('M+')">M+</button>
            <button class="btn mem" onclick="pressMem('M-')">M-</button>
            <button class="btn op" onclick="pressSci('percent')">%</button>

            <!-- Row 1: Scientific Functions -->
            <button class="btn sci" onclick="pressSci('sin')">sin</button>
            <button class="btn sci" onclick="pressSci('cos')">cos</button>
            <button class="btn sci" onclick="pressSci('tan')">tan</button>
            <button class="btn sci" onclick="pressSci('log')">log</button>
            <button class="btn sci" onclick="pressSci('ln')">ln</button>

            <!-- Row 2: Advanced Math -->
            <button class="btn sci" onclick="pressSci('sqrt')">√</button>
            <button class="btn sci" onclick="pressSci('pow')">xʸ</button>
            <button class="btn sci" onclick="pressSci('pi')">π</button>
            <button class="btn sci" onclick="pressSci('e')">e</button>
            <button class="btn sci" onclick="clearEntry()">CE</button>

            <!-- Row 3 -->
            <button class="btn action" onclick="clearAll()">C</button>
            <button class="btn action" onclick="press('(')">(</button>
            <button class="btn action" onclick="press(')')">)</button>
            <button class="btn action" onclick="backspace()">⌫</button>
            <button class="btn op" onclick="press('/')">÷</button>

            <!-- Row 4 -->
            <button class="btn" onclick="press('7')">7</button>
            <button class="btn" onclick="press('8')">8</button>
            <button class="btn" onclick="press('9')">9</button>
            <button class="btn op" onclick="press('*')">×</button>
            <button class="btn sci" onclick="pressSci('fact')">n!</button>

            <!-- Row 5 -->
            <button class="btn" onclick="press('4')">4</button>
            <button class="btn" onclick="press('5')">5</button>
            <button class="btn" onclick="press('6')">6</button>
            <button class="btn op" onclick="press('-')">−</button>
            <button class="btn sci" onclick="pressSci('exp')">Exp</button>

            <!-- Row 6 -->
            <button class="btn" onclick="press('1')">1</button>
            <button class="btn" onclick="press('2')">2</button>
            <button class="btn" onclick="press('3')">3</button>
            <button class="btn op" onclick="press('+')">+</button>
            <button class="btn equal" onclick="calculate()">=</button>

            <!-- Row 7 -->
            <button class="btn zero" onclick="press('0')">0</button>
            <button class="btn" onclick="press('.')">.</button>
        </div>

        <!-- Slide-out Past Calculations Log -->
        <div id="history-log" class="history-log">
            <div class="history-header">
                <h3>Calculation History</h3>
                <button class="close-btn" onclick="toggleHistoryLog()">✕</button>
            </div>
            <div id="history-list" class="history-list">
                <p class="empty-msg">No history yet</p>
            </div>
            <button class="clear-history-btn" onclick="clearHistoryLog()">Clear All History</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
